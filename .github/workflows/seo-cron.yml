          <script>
          const obs=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible')});},{threshold:.12});
          document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
          <\/script>
          </body></html>`;

          // Build files to deploy
          const files = { '/index.html': indexHtml };

          // Build blog pages
          posts.slice(0, 15).forEach(post => {
            const slug = slugify(post.title);
            files[`/blog/${slug}.html`] = `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>${post.title} | Trio Nexus</title><meta name="description" content="${(post.excerpt||'').substring(0,155)}"><link rel="canonical" href="https://www.trionexus.org/blog/${slug}.html"><style>body{font-family:sans-serif;background:#050C1A;color:#F0EBE0;margin:0;line-height:1.7}header{background:rgba(10,22,40,.95);border-bottom:1px solid rgba(197,162,77,.2);padding:1.2rem 3rem;display:flex;justify-content:space-between;align-items:center}.logo{font-size:1.4rem;color:#C5A24D;text-decoration:none;font-weight:700}nav a{color:#888;text-decoration:none;margin-left:1.5rem;font-size:.82rem}.content{max-width:800px;margin:0 auto;padding:4rem 3rem}h1{font-size:clamp(1.8rem,4vw,3rem);font-weight:400;line-height:1.15;margin-bottom:1rem;color:#F0EBE0}.meta{font-size:.78rem;color:#888;margin-bottom:2rem}.content p{color:#888;margin-bottom:1.5em}.content h2,.content h3{color:#F0EBE0;margin:2rem 0 1rem}.cta{background:#0A1628;border-top:1px solid rgba(197,162,77,.15);padding:3rem;text-align:center}.cta-btn{background:linear-gradient(135deg,#C5A24D,#D4B568);color:#050C1A;text-decoration:none;padding:.9rem 2.5rem;font-size:.8rem;letter-spacing:.15em;text-transform:uppercase;display:inline-block;font-weight:700;border-radius:6px}footer{border-top:1px solid rgba(197,162,77,.15);padding:2rem 3rem;text-align:center;font-size:.75rem;color:#555}@media(max-width:768px){.content{padding:3rem 1.5rem}}</style></head><body><header><a class="logo" href="/">Trio Nexus</a><nav><a href="/">Home</a><a href="/#services">Services</a><a href="/blog.html">Blog</a></nav></header><div class="content"><div class="meta">${post.category} · ${post.date} · ${post.readTime||'3 min read'}</div><h1>${post.title}</h1>${post.content||''}</div><section class="cta"><h2 style="color:#F0EBE0;font-weight:400;margin-bottom:1rem">Need expert guidance?</h2><a class="cta-btn" href="/">Contact Trio Nexus →</a></section><footer>© 2024 Trio Nexus, Lahore, Pakistan</footer></body></html>`;
          });

          // Build sitemap
          const today = new Date().toISOString().split('T')[0];
          files['/sitemap.xml'] = `<?xml version="1.0" encoding="UTF-8"?>\n<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n${Object.keys(files).filter(p=>p.endsWith('.html')).map(u=>`  <url>\n    <loc>https://www.trionexus.org${u}</loc>\n    <lastmod>${today}</lastmod>\n    <changefreq>weekly</changefreq>\n    <priority>${u==='/index.html'?'1.0':'0.8'}</priority>\n  </url>`).join('\n')}\n</urlset>`;
          files['/robots.txt'] = `User-agent: *\nAllow: /\nDisallow: /tn-admin-secure.html\n\nSitemap: https://www.trionexus.org/sitemap.xml\n\nUser-agent: GPTBot\nAllow: /\nUser-agent: PerplexityBot\nAllow: /`;
          files['/llms.txt'] = `# Trio Nexus\n# https://www.trionexus.org\n\n## About\nProfessional consultancy in Lahore, Pakistan: law, study abroad, HR.\n\n## FAQs\n${(data.faqs||[]).slice(0,5).map(f=>`Q: ${f.q}\nA: ${f.a}`).join('\n\n')}`;

          // ── MERGE live static files (won't overwrite freshly built ones) ──
          let mergedCount = 0;
          for (const [path, content] of Object.entries(liveFiles)) {
            if (!files[path]) {
              files[path] = content;
              mergedCount++;
            }
          }
          if (mergedCount > 0) console.log(`\n  Merged ${mergedCount} preserved live file(s) into deploy.`);

          // Compute SHA-1 digests
          const fileDigests = {};
          for (const [path, content] of Object.entries(files)) {
            fileDigests[path] = crypto.createHash('sha1').update(content).digest('hex');
          }

          console.log(`\nDeploying ${Object.keys(files).length} files to Netlify...`);

          // Create deploy
          const deployRes = await fetch(`https://api.netlify.com/api/v1/sites/${NETLIFY_SITE_ID}/deploys`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${NETLIFY_TOKEN}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ files: fileDigests })
          });

          if (!deployRes.ok) {
            const err = await deployRes.json().catch(() => ({}));
            throw new Error(`Deploy creation failed: ${err.message || deployRes.status}`);
          }

          const deploy = await deployRes.json();
          // Netlify's "required" array contains SHA1 HASHES that need uploading — NOT file paths!
          const requiredHashes = new Set(deploy.required || []);
          console.log(`Deploy ID: ${deploy.id} | Files required by hash: ${requiredHashes.size}`);

          // Upload files whose digest matches a required hash
          let uploaded = 0;
          for (const [filePath, content] of Object.entries(files)) {
            const hash = fileDigests[filePath];
            if (!requiredHashes.has(hash)) { console.log(`  skip (already on CDN): ${filePath}`); continue; }
            const uploadRes = await fetch(`https://api.netlify.com/api/v1/deploys/${deploy.id}/files${filePath}`, {
              method: 'PUT',
              headers: { 'Authorization': `Bearer ${NETLIFY_TOKEN}`, 'Content-Type': 'application/octet-stream' },
              body: Buffer.from(content)
            });
            if (uploadRes.ok) { uploaded++; console.log(`  ✓ uploaded: ${filePath}`); }
            else { console.error(`  ✗ FAILED: ${filePath}: ${uploadRes.status}`); }
          }

          console.log(`\n✓ Deploy complete: ${uploaded}/${requiredHashes.size} files uploaded`);
          console.log(`  Total files processed: ${Object.keys(files).length}`);
          })().catch(e => { console.error('Fatal error:', e); process.exit(1); });
          JSEOF
          node deploy-script.cjs

      - name: Commit SEO data back to repository
        run: |
          git config --global user.email "seo-bot@trionexus.org"
          git config --global user.name "Trio Nexus SEO Bot"
          git add seo-data.json
          git diff --staged --quiet || git commit -m "🤖 Autonomous SEO cycle — $(date '+%Y-%m-%d %H:%M PKT')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "=== Trio Nexus SEO Cycle Complete ==="
          echo "Time: $(date '+%Y-%m-%d %H:%M UTC')"
          echo "Next scheduled run: See cron schedule above"
          if [ -f seo-data.json ]; then
            node -e "
              const d=JSON.parse(require('fs').readFileSync('seo-data.json'));
              console.log('Total AI runs: '+(d.runs||0));
              console.log('Blog posts: '+(d.blog_posts||[]).length);
              console.log('FAQs: '+(d.faqs||[]).length);
            "
          fi
